name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: taxitool-bot
  REGION: us-central1
  IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT_ID }}/taxitool-bot

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud as a credential helper
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$GITHUB_SHA .
          docker tag $IMAGE_NAME:$GITHUB_SHA $IMAGE_NAME:latest

      - name: Push Docker image to GCR
        run: |
          docker push $IMAGE_NAME:$GITHUB_SHA
          docker push $IMAGE_NAME:latest

      # Deploy WITHOUT touching any secret-type env vars on the service.
      - name: Deploy to Cloud Run (webhook mode)
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE_NAME:$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 3 \
            --max-instances 10 \
            --concurrency 20 \
            --port 8080 \
            --set-env-vars MODE=webhook \
            --quiet

      - name: Get service URL
        run: |
          SERVICE_URL=$(gcloud run services describe $SERVICE_NAME --region=$REGION --format='value(status.url)')
          echo "Service deployed to: $SERVICE_URL"
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV

      - name: Wait for service to be ready
        run: |
          echo "Waiting for service to be ready..."
          for i in {1..30}; do
            if curl -f -s ${{ env.SERVICE_URL }}/health > /dev/null; then
              echo "✅ Service is ready!"
              break
            else
              echo "Waiting for service... ($i/30)"
              sleep 10
            fi
          done

      # Register Telegram webhook — assumes your Cloud Run Secret WEBHOOK_PATH is "/webhook".
      - name: Set Telegram webhook
        run: |
          curl -sS "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/setWebhook" \
            -d "url=${{ env.SERVICE_URL }}/webhook" \
            -d "secret_token=${{ secrets.WEBHOOK_SECRET }}" \
            -d 'allowed_updates=["message","callback_query"]'

      - name: Verify webhook status
        run: |
          curl -sS "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/getWebhookInfo"
