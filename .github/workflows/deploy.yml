name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: taxitool-bot
  REGION: us-central1
  IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT_ID }}/taxitool-bot

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud as a credential helper
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$GITHUB_SHA .
          docker tag $IMAGE_NAME:$GITHUB_SHA $IMAGE_NAME:latest

      - name: Push Docker image to GCR
        run: |
          docker push $IMAGE_NAME:$GITHUB_SHA
          docker push $IMAGE_NAME:latest

      # ── DEPLOY: Webhook mode ────────────────────────────────────────────────
      # Keep other deploy features; we just set MODE=webhook + needed secrets
      - name: Deploy to Cloud Run (webhook mode)
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE_NAME:$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars MODE=webhook,WEBHOOK_PATH=/webhook,WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }},TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }},SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_KEY=${{ secrets.SUPABASE_KEY }},OPENAI_KEY=${{ secrets.OPENAI_KEY }} \
            --quiet

      - name: Get service URL
        id: url
        run: |
          SERVICE_URL=$(gcloud run services describe $SERVICE_NAME --region=$REGION --format='value(status.url)')
          echo "Service deployed to: $SERVICE_URL"
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV

      # Register Telegram webhook (no bash shell tricks; just a simple HTTPS call)
      - name: Set Telegram webhook
        run: |
          curl -sS "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/setWebhook" \
            -d "url=${{ env.SERVICE_URL }}/webhook" \
            -d "secret_token=${{ secrets.WEBHOOK_SECRET }}" \
            -d "drop_pending_updates=true" \
            -d 'allowed_updates=["message","callback_query"]'
        env:
          SERVICE_URL: ${{ env.SERVICE_URL }}

      # Verify webhook (replaces old /health check used for polling)
      - name: Verify webhook status
        run: |
          INFO=$(curl -sS "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/getWebhookInfo")
          echo "$INFO"
          echo "$INFO" | jq -e '.result.url | length > 0' >/dev/null || (echo "Webhook URL not set" && exit 1)
